<body>

    <div class="container">

            <!-- Photos will be dynamically added here -->

    <div class="modal" id="photoModal">
        <div class="modal-scroll-container">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Celebrity Name</h2>
                    <button class="close-btn" id="closeModal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="modal-image">
                        <div class="loading-spinner" id="modalSpinner"></div>
                        <img id="modalImage" src="" alt="Celebrity Photo">
                    </div>
                    <div class="modal-details">
                        <h3 data-translate="details">Photo Details</h3>
                        
                        <div class="detail-item">

                            </div>
                        </div>
                        
                        <div class="detail-item">

                            <div>

                            </div>
                        </div>
                        
                        <div class="detail-item">

    <footer>

    <script>

        const photoData = [

            {

                date: "30 August 2025",
                occasion_en: "Open Day",
                occasion_sk: "Deň otvorených dverí",
                location: "Bratislavský hrad, Bratislava, SK",
                locationUrl: "https://maps.app.goo.gl/PuCuZUvNhxScJnge6",
                instagram: "michalsimecka",
                tiktok: "michalsimecka",
                website: "https://progresivne.sk",
                wikipedia: "https://sk.wikipedia.org/wiki/Michal_%C5%A0ime%C4%8Dka",
                facebook: "miso.simecka",
                twitter: "msimecka"
            }
        ];

        // Function to change language
        function changeLanguage(lang) {
            document.querySelectorAll('[data-translate]').forEach(element => {
                const key = element.getAttribute('data-translate');
                if (translations[lang][key]) {
                    element.textContent = translations[lang][key];
                }
            });
            
            // Update active button state
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
            });
            
            // Update occasion text in gallery
            updateGalleryOccasions(lang);
            
            // Update occasion text in modal if it's open
            const modal = document.getElementById('photoModal');
            if (modal.classList.contains('show')) {
                const currentPhotoId = parseInt(modal.dataset.currentPhotoId);
                const currentPhoto = photoData.find(photo => photo.id === currentPhotoId);
                if (currentPhoto) {
                    document.getElementById('modalOccasion').textContent = 
                        lang === 'sk' ? currentPhoto.occasion_sk : currentPhoto.occasion_en;
                }
            }
            
            // Store language preference
            localStorage.setItem('preferredLanguage', lang);
        }

        // Function to update occasions in gallery
        function updateGalleryOccasions(lang) {
            const gallery = document.getElementById('photoGallery');
            const cards = gallery.querySelectorAll('.photo-card');
            
            cards.forEach(card => {
                const photoId = parseInt(card.dataset.id);
                const photo = photoData.find(p => p.id === photoId);
                
                if (photo) {
                    const occasionElement = card.querySelector('.photo-info p');
                    occasionElement.innerHTML = `${photo.date} • ${lang === 'sk' ? photo.occasion_sk : photo.occasion_en}`;
                }
            });
        }

        // Function to generate gallery items
        function generateGallery() {
            const gallery = document.getElementById('photoGallery');
            gallery.innerHTML = '';
            
            const currentLang = getCurrentLanguage();
            
            photoData.forEach(photo => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.dataset.id = photo.id;
                
                card.innerHTML = `
                    <div class="image-container">
                        <div class="loading-spinner"></div>
                        <img src="${photo.imageSrc}" alt="Photo with ${photo.title}" 
                             onload="this.classList.add('loaded'); this.previousElementSibling.style.display='none';">
                    </div>
                    <div class="photo-info">
                        <h3>${photo.title}</h3>
                        <p>${photo.date} • ${currentLang === 'sk' ? photo.occasion_sk : photo.occasion_en}</p>
                    </div>
                `;
                
                card.addEventListener('click', () => openModal(photo));
                gallery.appendChild(card);
                
                // If image fails to load, keep the spinner visible
                const img = card.querySelector('img');
                img.addEventListener('error', function() {
                    this.previousElementSibling.style.display = 'block';
                });
            });
        }

        // Get current language
        function getCurrentLanguage() {
            return localStorage.getItem('preferredLanguage') || 'en';
        }

        // Function to open modal with photo details
        function openModal(photo) {
            const modal = document.getElementById('photoModal');
            const socialLinks = document.getElementById('socialLinks');
            const modalImage = document.getElementById('modalImage');
            const modalSpinner = document.getElementById('modalSpinner');
            
            // Show spinner in modal
            modalSpinner.style.display = 'block';
            modalImage.classList.remove('loaded');
            
            // Store current photo ID in modal for language updates
            modal.dataset.currentPhotoId = photo.id;
            
            // Set basic info
            document.getElementById('modalTitle').textContent = photo.title;
            document.getElementById('modalDate').textContent = photo.date;
            
            // Set occasion based on current language
            const currentLang = getCurrentLanguage();
            document.getElementById('modalOccasion').textContent = 
                currentLang === 'sk' ? photo.occasion_sk : photo.occasion_en;
                
            document.getElementById('locationText').textContent = photo.location;
            
            // Set location link
            const locationLink = document.getElementById('modalLocation');
            locationLink.href = photo.locationUrl;
            
            // Clear previous social links
            socialLinks.innerHTML = '';
            
            // Add social links if they exist
            if (photo.instagram) {
                socialLinks.innerHTML += `
                    <a href="https://instagram.com/${photo.instagram}" target="_blank" class="social-link">
                        <span class="social-icon instagram"><i class="fab fa-instagram"></i></span>
                        @${photo.instagram}
                    </a>
                `;
            }
            
            if (photo.tiktok) {
                socialLinks.innerHTML += `
                    <a href="https://tiktok.com/@${photo.tiktok}" target="_blank" class="social-link">
                        <span class="social-icon tiktok"><i class="fab fa-tiktok"></i></span>
                        @${photo.tiktok}
                    </a>
                `;
            }
            
            if (photo.website) {
                // Extract domain from URL
                const domain = photo.website.replace(/^https?:\/\//, '').split('/')[0];
                socialLinks.innerHTML += `
                    <a href="${photo.website}" target="_blank" class="social-link">
                        <span class="social-icon website"><i class="fas fa-globe"></i></span>
                        ${domain}
                    </a>
                `;
            }
            
            // Add Wikipedia link if it exists
            if (photo.wikipedia) {
                socialLinks.innerHTML += `
                    <a href="${photo.wikipedia}" target="_blank" class="social-link">
                        <span class="social-icon wikipedia"><i class="fab fa-wikipedia-w"></i></span>
                        Wikipedia
                    </a>
                `;
            }
            
            // Add Facebook link if it exists
            if (photo.facebook) {
                socialLinks.innerHTML += `
                    <a href="https://facebook.com/${photo.facebook}" target="_blank" class="social-link">
                        <span class="social-icon facebook"><i class="fab fa-facebook"></i></span>
                        ${photo.facebook}
                    </a>
                `;
            }
            
            // Add Twitter/X link if it exists
            if (photo.twitter) {
                socialLinks.innerHTML += `
                    <a href="https://x.com/${photo.twitter}" target="_blank" class="social-link">
                        <span class="social-icon twitter">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/0/0a/X_logo_2023_%28white%29.svg" 
                                 alt="X Logo" 
                                 style="width: 16px; height: 16px;">
                        </span>
                        @${photo.twitter}
                    </a>
                `;
            }
            
            // Load the modal image
            modalImage.src = photo.imageSrc;
            modalImage.alt = `Photo with ${photo.title}`;
            
            // Show modal
            modal.classList.add('show');
            
            // Scroll to top of modal
            modal.scrollTop = 0;
            
            // Update URL with hash
            window.location.hash = `photo-${photo.id}`;
            
            // Prevent body from scrolling when modal is open
            document.body.style.overflow = 'hidden';
        }

        // Close modal function
        function closeModal() {
            const modal = document.getElementById('photoModal');
            modal.classList.remove('show');
            
            // Clear the hash from URL without refreshing
            history.replaceState(null, null, ' ');
            
            // Re-enable body scrolling
            document.body.style.overflow = 'auto';
        }

        // Function to handle hash changes
        function handleHashChange() {
            const hash = window.location.hash.substring(1); // Remove the #
            
            if (hash.startsWith('photo-')) {
                const photoId = parseInt(hash.split('-')[1]);
                const photo = photoData.find(p => p.id === photoId);
                
                if (photo) {
                    openModal(photo);
                    return;
                }
            }
            
            // If hash doesn't match a photo, close the modal
            closeModal();
        }

        // Setup modal close handlers
        function setupModalClose() {
            const modal = document.getElementById('photoModal');
            const closeBtn = document.getElementById('closeModal');
            
            closeBtn.addEventListener('click', closeModal);
            
            window.addEventListener('click', (event) => {
                if (event.target === modal) {
                    closeModal();
                }
            });
            
            // Close modal with Escape key
            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape' && modal.classList.contains('show')) {
                    closeModal();
                }
            });
        }

        // Initialize the gallery when page loads
        document.addEventListener('DOMContentLoaded', () => {
            // Set language based on preference or default to English
            const preferredLanguage = localStorage.getItem('preferredLanguage') || 'sk';
            changeLanguage(preferredLanguage);
            
            // Set up language switcher
            document.querySelectorAll('.lang-btn').forEach(button => {
                button.addEventListener('click', () => {
                    changeLanguage(button.getAttribute('data-lang'));
                });
            });
            
            generateGallery();
            setupModalClose();
            
            // Handle modal image loading
            const modalImage = document.getElementById('modalImage');
            const modalSpinner = document.getElementById('modalSpinner');
            
            modalImage.addEventListener('load', function() {
                this.classList.add('loaded');
                modalSpinner.style.display = 'none';
            });
            
            modalImage.addEventListener('error', function() {
                modalSpinner.style.display = 'block';
            });
            
            // Check for hash on page load
            if (window.location.hash) {
                handleHashChange();
            }
            
            // Listen for hash changes
            window.addEventListener('hashchange', handleHashChange);
        });
    </script>
</body>
</html>
