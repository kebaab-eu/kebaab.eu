<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Your Destination</title>
<style>
:root {
  --primary-bg: linear-gradient(135deg, #1f1f1f, #2c2c2c);
  --card-bg: #292929;
  --card-hover: #333;
  --header-bg: #2a2a2a;
  --text-color: white;
  --accent-color: #ffffff;
  --accent-blue: #4a9bff;
  --accent-green: #2ecc71; /* nice green for Linktree */
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: var(--primary-bg);
  color: var(--text-color);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  line-height: 1.6;
}

/* Header Styles */
header {
  display: flex;
  justify-content: flex-end;
  padding: 15px 20px;
  position: relative;
  background: rgba(0, 0, 0, 0.2);
}

.lang-switcher {
  background-color: var(--header-bg);
  color: var(--text-color);
  border: 1px solid #444;
  border-radius: 8px;
  padding: 8px 15px;
  font-size: 1rem;
  appearance: none;
  outline: none;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  z-index: 10;
}

.lang-switcher:hover {
  background-color: #3a3a3a;
  border-color: #666;
}

.lang-switcher option {
  background-color: var(--header-bg);
  color: var(--text-color);
}

/* Main Content */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 40px;
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
  font-weight: 600;
  text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}

.subtitle {
  color: #aaa;
  font-size: 1.1rem;
  max-width: 600px;
}

/* Card Container */
.choice {
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 20px;
}

/* Card Styles */
.card {
  display: block;
  background: var(--card-bg);
  border-radius: 15px;
  padding: 30px 25px;
  text-align: center;
  width: 280px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.4);
  transition: all 0.3s ease;
  text-decoration: none;
  color: var(--text-color);
  position: relative;
  overflow: hidden;
  border: 1px solid #3a3a3a;
}

.card:hover {
  transform: translateY(-8px);
  background: var(--card-hover);
  box-shadow: 0 12px 20px rgba(0,0,0,0.5);
  border-color: #555;
}

.card:hover::after {
  opacity: 1;
}

.card::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 5px;
  background: var(--accent-color);
  opacity: 0;
  transition: opacity 0.3s ease;
}

/* ==== Linktree specific overrides (same behavior, just green) ==== */
.card.linktree::after {
  background: var(--accent-green);
}
.card.linktree:hover::after {
  background: var(--accent-green);
}
.card.linktree:hover img {
  border-color: var(--accent-green);
}
.card.linktree:hover .official-name {
  color: var(--accent-green);
}

/* ==== Gravatar specific overrides (same behavior, just green) ==== */
.card.gravatar::after {
  background: var(--accent-blue);
}
.card.gravatar:hover::after {
  background: var(--accent-blue);
}
.card.gravatar:hover img {
  border-color: var(--accent-blue);
}
.card.gravatar:hover .official-name {
  color: var(--accent-blue);
}
  
.card img {
  border-radius: 50%;
  width: 130px;
  height: 130px;
  object-fit: cover;
  margin-bottom: 20px;
  border: 3px solid #3a3a3a;
  transition: all 0.3s ease;
}

.card:hover img {
  border-color: var(--accent-color);
  transform: scale(1.05);
}

/* Updated card label styles */
.card-label-container {
  display: block;
}

.official-name {
  display: block;
  font-size: 1.5rem;
  font-weight: bold;
  transition: color 0.3s ease;
}

.translation {
  display: none; /* Hidden by default */
  font-size: 0.9rem;
  color: #888;
  margin-top: 4px;
}

/* Show translations for Korean and Japanese */
.lang-ko .translation,
.lang-ja .translation,
.lang-ru .translation {
  display: block;
}

/* Hover effects */
.card:hover .official-name {
  color: var(--accent-color);
}
.card:hover .translation {
  color: #aaa; /* Lighter than default on hover */
}

/* Footer Styles */
footer {
  text-align: center;
  padding: 25px;
  font-size: 0.9rem;
  color: #aaa;
  background: rgba(0, 0, 0, 0.2);
  margin-top: auto;
}

/* Mobile Responsiveness */
@media (max-width: 768px) {
  header {
    justify-content: center;
    padding: 15px;
  }
  
  h1 {
    font-size: 2rem;
  }
  
  .subtitle {
    font-size: 1rem;
    padding: 0 15px;
  }
  
  .choice {
    flex-direction: column;
    gap: 25px;
    width: 100%;
    max-width: 400px;
  }
  
  .card {
    width: 100%;
    padding: 25px 20px;
  }
  
  .card img {
    width: 110px;
    height: 110px;
  }
  
  .official-name {
    font-size: 1.4rem;
  }
}

@media (max-width: 480px) {
  h1 {
    font-size: 1.8rem;
  }
  
  .subtitle {
    font-size: 0.95rem;
  }
  
  .card {
    padding: 20px 15px;
  }
  
  .card img {
    width: 100px;
    height: 100px;
  }
  
  .official-name {
    font-size: 1.3rem;
  }
}

/* Language Indicator */
.lang-indicator {
  position: absolute;
  top: 15px;
  left: 20px;
  background: rgba(0, 0, 0, 0.3);
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 0.9rem;
  text-transform: uppercase;
  border: 1px solid #444;
}

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

main > * {
  animation: fadeIn 0.6s ease-out forwards;
}

.choice {
  animation-delay: 0.2s;
}

/* Noscript warning */
noscript {
  display: block;
  background-color: #b00020;
  color: white;
  padding: 12px 20px;
  text-align: center;
  font-weight: bold;
  position: sticky;
  top: 0;
  z-index: 100;
}
</style>
</head>
<body>
<noscript>
  JavaScript is disabled in your browser. Some features may not work, and further websites may load incorrectly.
</noscript>

<header>
  <div class="lang-indicator" id="langIndicator">EN</div>
  <select id="languageSwitcher" class="lang-switcher">
    <option value="en">English</option>
    <option value="cs">Čeština</option>
    <option value="sk">Slovenčina</option>
    <option value="de">Deutsch</option>
    <option value="ru">Русский</option>
    <option value="fr">Français</option>
    <option value="ko">한국어</option>
    <option value="es">Español</option>
    <option value="ja">日本語</option>
  </select>
</header>

<main>
  <h1 id="title">Where do you want to go?</h1>
  <p class="subtitle" id="subtitle">Select a destination to explore my profiles</p>
  
  <div class="choice">
    <a class="card linktree" href="https://kebaab.eu/linktree">
      <img src="https://ugc.production.linktr.ee/a39ca232-6bf8-4955-b20f-3de2129cb6ab_Screenshot-2025-04-06-145100.png?io=true&size=avatar-v3_0" alt="Linktree Profile Picture">
      <div class="card-label-container">
        <span class="official-name">Linktree</span>
        <span class="translation" id="linktreeTranslation"></span>
      </div>
    </a>
    
    <a class="card gravatar" href="https://kebaab.eu/gravatar">
      <img src="https://1.gravatar.com/avatar/f696919be8b6c0df1813a948b1b7395e8c486adf13c837956b9e5a7119a93443?size=256&d=initials" alt="Gravatar Profile Picture">
      <div class="card-label-container">
        <span class="official-name">Gravatar</span>
        <span class="translation" id="gravatarTranslation"></span>
      </div>
    </a>

    <a class="card album" href="https://kebaab.eu/album/celebrities/">
      <img src="https://kebaab.eu/album/celebrities/cover.png" alt="Celebrity Album Cover">
      <div class="card-label-container">
        <span class="official-name">Album</span>
        <span class="translation" id="albumTranslation"></span>
      </div>
    </a>
  </div>
</main>

<footer>
  <span id="copyright">2025 &copy; kebaab.eu</span>
</footer>

<script>
const translations = {
  en: {
    title: "Where do you want to go?",
    subtitle: "Select a destination to explore my profiles",
    linktree: "Linktree",
    gravatar: "Gravatar",
    album: "Album",
    copyright: "© kebaab.eu",
    noscript: "JavaScript is disabled in your browser. Some features may not work, and further websites may load incorrectly."
  },
  cs: {
    title: "Kam chcete jít?",
    subtitle: "Vyberte si cíl pro prozkoumání mých profilů",
    linktree: "Linktree",
    gravatar: "Gravatar",
    album: "Album",
    copyright: "© kebaab.eu",
    noscript: "JavaScript je ve vašem prohlížeči zakázán. Některé funkce nemusí fungovat a další weby se mohou načítat nesprávně."
  },
  sk: {
    title: "Kam chcete ísť?",
    subtitle: "Vyberte si cieľ na preskúmanie mojich profilov",
    linktree: "Linktree",
    gravatar: "Gravatar",
    album: "Album",
    copyright: "© kebaab.eu",
    noscript: "JavaScript je vo vašom prehliadači zakázaný. Niektoré funkcie nemusia fungovať a ďalšie weby sa môžu načítať nesprávne."
  },
  de: {
    title: "Wohin möchten Sie gehen?",
    subtitle: "Wählen Sie ein Ziel, um meine Profile zu erkunden",
    linktree: "Linktree",
    gravatar: "Gravatar",
    album: "Album",
    copyright: "© kebaab.eu",
    noscript: "JavaScript ist in Ihrem Browser deaktiviert. Einige Funktionen funktionieren möglicherweise nicht und weitere Websites könnten fehlerhaft geladen werden."
  },
  ru: {
    title: "Куда вы хотите пойти?",
    subtitle: "Выберите пункт назначения для просмотра моих профилей",
    linktree: "Линктре",
    gravatar: "Граватар",
    album: "Альбом",
    copyright: "© kebaab.eu",
    noscript: "JavaScript отключен в вашем браузере. Некоторые функции могут не работать, и последующие сайты могут загружаться неправильно."
  },
  fr: {
    title: "Où voulez-vous aller ?",
    subtitle: "Sélectionnez une destination pour explorer mes profils",
    linktree: "Linktree",
    gravatar: "Gravatar",
    album: "Album",
    copyright: "© kebaab.eu",
    noscript: "JavaScript est désactivé dans votre navigateur. Certaines fonctionnalités peuvent ne pas fonctionner et d'autres sites peuvent mal se charger."
  },
  ko: {
    title: "어디로 가시겠습니까?",
    subtitle: "내 프로필을 탐색할 대상을 선택하세요",
    linktree: "링크트리",
    gravatar: "그라바타",
    album: "앨범",
    copyright: "© kebaab.eu",
    noscript: "브라우저에서 JavaScript가 비활성화되어 있습니다. 일부 기능이 작동하지 않을 수 있으며 다른 사이트가 잘못 로드될 수 있습니다."
  },
  es: {
    title: "¿A dónde quieres ir?",
    subtitle: "Selecciona un destino para explorar mis perfiles",
    linktree: "Linktree",
    gravatar: "Gravatar",
    album: "Álbum",
    copyright: "© kebaab.eu",
    noscript: "JavaScript está desactivado en tu navegador. Es posible que algunas funciones no funcionen y otros sitios se carguen incorrectamente."
  },
  ja: {
    title: "どこに行きたいですか？",
    subtitle: "プロフィールを探索する目的地を選択してください",
    linktree: "リンクトリー",
    gravatar: "グラバター",
    album: "アルバム",
    copyright: "© kebaab.eu",
    noscript: "ブラウザでJavaScriptが無効になっています。一部の機能が動作しない可能性があり、他のサイトが正しく読み込まれない場合があります。"
  }
};

// DOM Elements
const languageSwitcher = document.getElementById("languageSwitcher");
const title = document.getElementById("title");
const subtitle = document.getElementById("subtitle");
const linktreeTranslation = document.getElementById("linktreeTranslation");
const gravatarTranslation = document.getElementById("gravatarTranslation");
const albumTranslation = document.getElementById("albumTranslation");
const copyright = document.getElementById("copyright");
const langIndicator = document.getElementById("langIndicator");

// Detect browser language with fallback
function detectLanguage() {
  // Try to get from localStorage first
  const savedLang = localStorage.getItem('preferredLang');
  if (savedLang && translations[savedLang]) return savedLang;
  
  // Get from browser settings
  const browserLang = navigator.language.slice(0,2);
  if (translations[browserLang]) return browserLang;
  
  // Check all supported languages
  const supportedLangs = Object.keys(translations);
  for (let lang of navigator.languages) {
    const code = lang.slice(0,2);
    if (supportedLangs.includes(code)) return code;
  }
  
  // Fallback to English
  return "en";
}

// Update UI with translations
function updateLanguage(lang) {
  if (translations[lang]) {
    document.documentElement.lang = lang;
    document.body.className = `lang-${lang}`;
    title.textContent = translations[lang].title;
    subtitle.textContent = translations[lang].subtitle;
    linktreeTranslation.textContent = translations[lang].linktree;
    gravatarTranslation.textContent = translations[lang].gravatar;
    albumTranslation.textContent = translations[lang].album;
    copyright.textContent = `${new Date().getFullYear()} ${translations[lang].copyright}`;
    langIndicator.textContent = lang.toUpperCase();
    
    // Update language switcher
    languageSwitcher.value = lang;
    
    // Save preference
    localStorage.setItem('preferredLang', lang);
  }
}

// Initialize
function init() {
  const lang = detectLanguage();
  updateLanguage(lang);
  
  // Set up language switcher
  languageSwitcher.addEventListener("change", (e) => {
    updateLanguage(e.target.value);
  });
  
  // Set footer year
  copyright.textContent = `${new Date().getFullYear()} ${translations[lang].copyright}`;
}

// Initialize when DOM is loaded
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
