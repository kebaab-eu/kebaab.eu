<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Opening Mail…</title>
  <script>
    // Try to open mail client
    window.location.href = "mailto:samuel.capay@outlook.com";

    // Attempt to close the tab
    setTimeout(function() {
      window.open('', '_self'); // Some browsers need this trick
      window.close();
    }, 100); // small delay to allow mail client to open
  </script>
</head>
<body>
  <p>If your mail client doesn't open, <a href="mailto:samuel.capay@outlook.com">click here</a>.</p>
</body>
</html>
